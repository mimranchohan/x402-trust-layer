services:
  - type: web
    name: x402-agent-suite
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NETWORK
        value: solana
      - key: PAY_TO_ADDRESS
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
