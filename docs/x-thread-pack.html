<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070b12;
      --panel: #0f1623;
      --panel2: #141c2b;
      --cyan: #22d3ee;
      --cyan-dim: rgba(34, 211, 238, 0.12);
      --text: #e8eef7;
      --muted: #8b9cb3;
      --border: rgba(34, 211, 238, 0.22);
      --good: #34d399;
      --warn: #fbbf24;
      --bad: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 32px 24px 80px;
    }
    .wrap { max-width: 920px; margin: 0 auto; }
    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 40px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .brand img { width: 72px; height: 72px; }
    .brand h1 { margin: 0; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .brand p { margin: 6px 0 0; color: var(--muted); font-size: 0.95rem; }
    .instr {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 40px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .instr strong { color: var(--cyan); }
    .post {
      margin-bottom: 56px;
      scroll-margin-top: 24px;
    }
    .post-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .post-head span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--cyan);
    }
    .tweet-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 16px;
      position: relative;
    }
    .tweet-box label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 10px;
    }
    .tweet-text {
      white-space: pre-wrap;
      font-size: 0.98rem;
      margin: 0;
      font-family: inherit;
      color: var(--text);
    }
    .copy-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--cyan-dim);
      border: 1px solid var(--border);
      color: var(--cyan);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }
    .copy-btn:hover { background: rgba(34, 211, 238, 0.22); }
    .graphic-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    /* Export card 1200x675 aspect */
    .graphic {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 1200 / 675;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: clamp(0.65rem, 1.4vw, 0.85rem);
    }
    .g-head {
      background: var(--cyan);
      color: #061018;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .g-head h3 {
      margin: 0;
      font-size: clamp(0.9rem, 2vw, 1.15rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .g-badge {
      background: rgba(6, 16, 24, 0.25);
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.8em;
      white-space: nowrap;
    }
    .g-body {
      flex: 1;
      padding: 16px 20px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px 20px;
    }
    .g-full { grid-column: 1 / -1; }
    .g-block h4 {
      margin: 0 0 6px;
      font-size: 0.65em;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cyan);
    }
    .g-block p, .g-block ul {
      margin: 0;
      color: var(--text);
      font-size: 0.95em;
      line-height: 1.45;
    }
    .g-block ul { padding-left: 1.1em; }
    .chains {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      background: var(--cyan-dim);
      border: 1px solid var(--border);
      font-size: 0.85em;
      font-weight: 600;
      color: var(--cyan);
    }
    .compare {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      grid-column: 1 / -1;
    }
    .col {
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
    }
    .col h5 { margin: 0 0 6px; font-size: 0.9em; color: var(--cyan); }
    .flow {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      grid-column: 1 / -1;
    }
    .flow span {
      background: var(--cyan-dim);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85em;
    }
    .flow .arr { color: var(--muted); background: none; border: none; padding: 0; }
    .g-foot {
      padding: 10px 20px 14px;
      border-top: 1px solid var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75em;
      color: var(--muted);
    }
    .score-row {
      display: flex;
      gap: 10px;
      grid-column: 1 / -1;
    }
    .score {
      flex: 1;
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid var(--border);
    }
    .score b { color: var(--good); font-size: 1.2em; }
    @media print {
      body { background: #fff; color: #111; }
      .copy-btn, .instr { display: none; }
      .post { page-break-inside: avoid; }
    }
  </style>
</head>

        { h: "Paid test", p: "Separate payer wallet + Dexter" }
      ]}},
      { n: 25, title: "CTA", tweet: `Building agents that pay for APIs?\n\n1) Bookmark the 5 focus endpoints\n2) Run Trust Pack on your worst downstream provider\n3) Tell us which route saved a bad settlement\n\nRT · Follow · DM for fleet pricing / Postgres registry\n\nProduction:\n${BASE}`, graphic: { head: "GET STARTED", blocks: [
        { full: true, h: "5 endpoints", p: "Proxy · Pipeline · Verify · Registry · Refund" },
        { h: "Benefit", p: "Trust Pack on your riskiest downstream first." },
        { full: true, h: "Production", p: BASE }
      ]}}
    ];

    function renderGraphic(g, n) {
      let html = `<div class="graphic" id="graphic-${String(n).padStart(2,"0")}">`;
      html += `<div class="g-head"><h3>${g.head}</h3><span class="g-badge">${n}/25</span></div><div class="g-body">`;
      if (g.flow) {
        html += `<div class="g-block g-full"><h4>How it works</h4><div class="flow">`;
        g.flow.forEach((s,i) => { html += `<span>${s}</span>`; if (i < g.flow.length-1) html += `<span class="arr">→</span>`; });
        html += `</div></div>`;
      }
      if (g.compare) {
        html += `<div class="compare">`;
        g.compare.forEach(c => {
          html += `<div class="col"><h5>${c.h}</h5><ul>`;
          c.items.forEach(i => html += `<li>${i}</li>`);
          html += `</ul></div>`;
        });
        html += `</div>`;
      }
      if (g.scores) {
        html += `<div class="score-row">`;
        g.scores.forEach(s => {
          html += `<div class="score"><div>${s.name}${s.price ? " · "+s.price : ""}</div><b>${s.s}</b></div>`;
        });
        html += `</div>`;
      }
      (g.blocks || []).forEach(b => {
        html += `<div class="g-block${b.full ? " g-full" : ""}">`;
        if (b.h) html += `<h4>${b.h}</h4>`;
        if (b.p) html += `<p>${b.p}</p>`;
        if (b.pills) html += `<div class="chains">${b.pills.map(p => `<span class="pill">${p}</span>`).join("")}</div>`;
        html += `</div>`;
      });
      html += `</div><div class="g-foot">${BASE}</div></div>`;
      return html;
    }

    const root = document.getElementById("posts");
    posts.forEach(p => {
      const el = document.createElement("article");
      el.className = "post";
      el.id = `post-${p.n}`;
      el.innerHTML = `
        <div class="post-head"><span>Post ${p.n}/25</span><span>${p.title}</span></div>
        <div class="tweet-box">
          <label>Tweet — copy & post first</label>
          <button type="button" class="copy-btn" data-tweet="${p.n}">Copy tweet</button>
          <pre class="tweet-text" id="tweet-${p.n}"></pre>
        </div>
        <div class="graphic-label">Image — attach below tweet on X</div>
        ${renderGraphic(p.graphic, p.n)}
      `;
      root.appendChild(el);
      document.getElementById(`tweet-${p.n}`).textContent = p.tweet;
    });

    document.querySelectorAll(".copy-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const n = btn.dataset.tweet;
        const t = document.getElementById(`tweet-${n}`).textContent;
        navigator.clipboard.writeText(t).then(() => { btn.textContent = "Copied!"; setTimeout(() => btn.textContent = "Copy tweet", 1500); });
      });
    });
  </script>
</body>
</html>
